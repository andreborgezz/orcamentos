<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CORE — Configurações da Conta e Empresa.">
  <title>Configurações — CORE</title>
  <link rel="stylesheet" href="../../global.css">
  <link rel="stylesheet" href="configuracoes.css">
  <link rel="icon" href="../../assets/LogoCore.png" type="Logo @Core">
</head>

<body>
  <div class="app-layout">
    <main class="main-content">

      <!-- Page Header -->
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">Configurações</h1>
            <p class="page-subtitle">Gerencie suas informações pessoais e os dados da sua empresa.</p>
          </div>
          <button class="btn btn-primary" id="btn-save-settings" onclick="salvarConfiguracoes()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            Salvar Alterações
          </button>
        </div>
      </div>

      <div class="config-grid">
        <!-- Coluna Esquerda: Dados Pessoais -->
        <div class="config-col">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  style="width:20px;height:20px;margin-right:8px;vertical-align:middle;color:var(--color-primary)">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                Dados Pessoais
              </h2>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label" for="input-nome">Nome Completo</label>
                <input type="text" class="form-input" id="input-nome" placeholder="Seu nome">
              </div>
              <div class="form-group">
                <label class="form-label" for="input-email">E-mail de Acesso</label>
                <input type="email" class="form-input" id="input-email" placeholder="seu@email.com">
              </div>
              <div class="form-group">
                <label class="form-label" for="input-senha-atual">Senha Atual</label>
                <div style="position: relative;">
                  <input type="password" class="form-input" id="input-senha-atual" placeholder="••••••••" style="padding-right: 40px;">
                  <button type="button" class="btn-icon btn-ghost" onclick="togglePassword('input-senha-atual', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; color: var(--color-text-tertiary);">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <p class="form-hint" style="margin-top: 4px;">Necessária apenas se for alterar sua senha.</p>
              </div>
              <div class="form-group">
                <label class="form-label" for="input-nova-senha">Nova Senha</label>
                <div style="position: relative;">
                  <input type="password" class="form-input" id="input-nova-senha" placeholder="••••••••" style="padding-right: 40px;">
                  <button type="button" class="btn-icon btn-ghost" onclick="togglePassword('input-nova-senha', this)" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; color: var(--color-text-tertiary);">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <p class="form-hint" style="margin-top: 4px;">Deixe em branco se não quiser alterar.</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Coluna Direita: Dados da Empresa -->
        <div class="config-col">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  style="width:20px;height:20px;margin-right:8px;vertical-align:middle;color:var(--color-primary)">
                  <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                  <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                </svg>
                Dados da Empresa
              </h2>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label" for="input-empresa">Nome Fantasia / Razão Social</label>
                <input type="text" class="form-input" id="input-empresa" placeholder="Nome da sua empresa">
              </div>
              <div class="form-group">
                <label class="form-label" for="input-cnpj">CNPJ / CPF</label>
                <input type="text" class="form-input" id="input-cnpj" placeholder="00.000.000/0001-00">
              </div>
              <div class="form-group">
                <label class="form-label" for="input-telefone">Telefone / WhatsApp</label>
                <input type="text" class="form-input" id="input-telefone" placeholder="(11) 90000-0000">
                <p class="form-hint" style="margin-top: 4px;">Estes dados aparecerão no cabeçalho ou rodapé dos seus PDFs.</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../../components/auth.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="../../components/toast.js"></script>
  <script src="configuracoes.js"></script>
</body>

</html>
