<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CORE — Crie orçamentos profissionais com cálculo automático.">
  <title>Novo Orçamento — CORE</title>
  <link rel="stylesheet" href="../../global.css">
  <link rel="stylesheet" href="novo_orcamento.css">
  <link rel="icon" href="assets/LogoCore.png" type="Logo @Core">
</head>

<body>
  <div class="app-layout">
    <main class="main-content">

      <!-- Page Header -->
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">Novo Orçamento</h1>
            <p class="page-subtitle">Adicione produtos, defina condições e gere seu orçamento.</p>
          </div>
          <div class="flex items-center gap-2">
            <button class="btn btn-secondary" onclick="resetForm()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                <path d="M21 3v5h-5" />
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                <path d="M8 16H3v5" />
              </svg>
              Limpar
            </button>
          </div>
        </div>
      </div>

      <div class="orcamento-grid">
        <!-- Left Column: Form -->
        <div class="orcamento-form-col">

          <!-- Client Selection Card -->
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                  style="width:20px;height:20px;margin-right:8px;vertical-align:middle;color:var(--color-primary)">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                </svg>
                Cliente
              </h2>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label" for="select-cliente">Selecione o cliente</label>
                <select class="form-select" id="select-cliente">
                  <option value="">Escolha um cliente...</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Products Card -->
          <div class="card mt-4">
            <div class="card-header">
              <h2 class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                  style="width:20px;height:20px;margin-right:8px;vertical-align:middle;color:var(--color-primary)">
                  <path d="m7.5 4.27 9 5.15" />
                  <path
                    d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
                  <path d="m3.3 7 8.7 5 8.7-5" />
                  <path d="M12 22V12" />
                </svg>
                Itens do Orçamento
              </h2>
              <button class="btn btn-primary btn-sm" id="btn-add-item" onclick="addItemRow()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14" />
                  <path d="M12 5v14" />
                </svg>
                Adicionar Item
              </button>
            </div>
            <div class="card-body" style="padding: 0;">
              <div class="items-table-container">
                <table class="table items-table" id="table-items">
                  <thead>
                    <tr>
                      <th style="width: 40%;">Produto / Serviço</th>
                      <th style="width: 15%;">Qtd.</th>
                      <th style="width: 20%;">Preço Unit.</th>
                      <th style="width: 20%;" class="text-right">Subtotal</th>
                      <th style="width: 5%;"></th>
                    </tr>
                  </thead>
                  <tbody id="tbody-items">
                    <!-- Rows dinâmicas -->
                  </tbody>
                </table>
              </div>

              <div class="empty-items" id="empty-items">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7.5 4.27 9 5.15" />
                  <path
                    d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
                  <path d="m3.3 7 8.7 5 8.7-5" />
                  <path d="M12 22V12" />
                </svg>
                <p>Nenhum item adicionado ainda.</p>
                <span>Clique em "Adicionar Item" para começar.</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column: Summary -->
        <div class="orcamento-summary-col">
          <div class="card summary-card">
            <div class="card-header">
              <h2 class="card-title">Resumo</h2>
            </div>
            <div class="card-body">
              <!-- Summary rows -->
              <div class="summary-row">
                <span class="summary-label">Subtotal</span>
                <span class="summary-value" id="summary-subtotal">R$ 0,00</span>
              </div>

              <div class="divider"></div>

              <div class="form-group">
                <label class="form-label" for="input-desconto">Desconto (R$)</label>
                <input type="number" class="form-input" id="input-desconto" placeholder="0,00" value="0" min="0"
                  step="0.01" oninput="recalculate()">
              </div>

              <div class="form-group mt-4">
                <label class="form-label" for="input-frete">Frete (R$)</label>
                <input type="number" class="form-input" id="input-frete" placeholder="0,00" value="0" min="0"
                  step="0.01" oninput="recalculate()">
              </div>

              <div class="divider"></div>

              <div class="summary-row summary-total">
                <span class="summary-label">Total</span>
                <span class="summary-value" id="summary-total">R$ 0,00</span>
              </div>
            </div>

            <div class="card-footer" style="flex-direction: column; gap: var(--space-3); align-items: stretch;">
              <button class="btn btn-primary btn-lg" id="btn-save" onclick="saveOrcamento()" style="width: 100%;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" />
                  <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7" />
                  <path d="M7 3v4a1 1 0 0 0 1 1h7" />
                </svg>
                Salvar Orçamento
              </button>
              <button class="btn btn-secondary" style="width: 100%;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" x2="12" y1="15" y2="3" />
                </svg>
                Exportar PDF
              </button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="/components/auth.js"></script>
  <script src="/components/sidebar.js"></script>
  <script src="/components/toast.js"></script>
  <script src="novo_orcamento.js"></script>
</body>

</html>
