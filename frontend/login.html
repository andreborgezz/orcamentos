<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CORE — Acesse o sistema de orçamentos profissional.">
  <title>Login - CORE</title>
  <link rel="stylesheet" href="global.css">

  <link rel="icon" href="assets/LogoCore.png" type="Logo @Core">

  <style>
    /* ── Login Page Specific ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--color-bg);
      padding: var(--space-4);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: var(--space-8);
      animation: fade-up 0.5s ease;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-4);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .login-logo svg {
      width: 28px;
      height: 28px;
      color: white;
    }

    .login-brand h1 {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.03em;
    }

    .login-brand p {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      margin-top: var(--space-1);
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
      animation: fade-up 0.5s ease 0.1s both;
    }

    .login-card .form-group+.form-group {
      margin-top: var(--space-4);
    }

    .login-card .btn-primary {
      width: 100%;
      height: 44px;
      margin-top: var(--space-6);
      font-size: var(--font-size-md);
      font-weight: 600;
    }

    .login-error {
      display: none;
      margin-top: var(--space-4);
      padding: var(--space-3) var(--space-4);
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-md);
      color: var(--color-danger);
      font-size: var(--font-size-sm);
      text-align: center;
    }

    .login-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--font-size-sm);
      color: var(--color-text-tertiary);
      animation: fade-up 0.5s ease 0.2s both;
    }

    .login-footer a {
      color: var(--color-primary);
      font-weight: 500;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-loading {
      opacity: 0.7;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <!-- Branding -->
    <div class="login-brand">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 2 7l10 5 10-5-10-5Z" />
          <path d="m2 17 10 5 10-5" />
          <path d="m2 12 10 5 10-5" />
        </svg>
      </div>
      <h1>CORE</h1>
      <p>Sistema de Orçamentos</p>
    </div>

    <!-- Login Form -->
    <div class="login-card">
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="input-email">E-mail</label>
          <input type="email" class="form-input" id="input-email" placeholder="seu@email.com" required
            autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="input-senha">Senha</label>
          <input type="password" class="form-input" id="input-senha" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <div class="login-error" id="login-error"></div>
        <button type="submit" class="btn btn-primary" id="btn-login">Entrar</button>
      </form>
    </div>

    <p class="login-footer">
      Não tem uma conta? <a href="#">Fale conosco</a>
    </p>
  </div>

  <script src="components/auth.js"></script>
  <script>
    // Se já estiver logado, vai direto pro dashboard
    (function () {
      const user = getUsuarioLogado();
      if (user && user.id_usuario) {
        window.location.href = '/pages/dashboard/dashboard.html';
      }
    })();

    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('input-email').value.trim();
      const senha = document.getElementById('input-senha').value;
      const btn = document.getElementById('btn-login');
      const errorEl = document.getElementById('login-error');

      // Reset estado
      errorEl.style.display = 'none';
      btn.classList.add('btn-loading');
      btn.textContent = 'Entrando...';

      const resultado = await fazerLogin(email, senha);

      if (resultado.success) {
        window.location.href = '/pages/dashboard/dashboard.html';
      } else {
        errorEl.textContent = resultado.error;
        errorEl.style.display = 'block';
        btn.classList.remove('btn-loading');
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>

</html>
